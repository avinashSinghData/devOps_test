resources:
  jobs:
    loan_pipeline:
      name: ${bundle.target}-loan-pipeline
      
      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./bronze/ingest
            source: GIT
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
        
        - task_key: silver_transform
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./silver/transform
            source: GIT
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
        
        - task_key: gold_reporting
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: ./gold/reporting
            source: GIT
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
      
      git_source:
        git_url: https://github.com/avinashSinghData/devOps_test
        git_provider: gitHub
        git_branch: first_branch
      
      max_concurrent_runs: 1
      
      tags:
        project: loan-portfolio
        environment: ${bundle.target}
