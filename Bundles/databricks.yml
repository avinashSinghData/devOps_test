bundle:
  name: test_bundles

resources:
  jobs:
    data_pipeline_job:
      name: notebook_job
      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../01_bronze/ingest.ipynb
            source: WORKSPACE
          compute_key: serverless
          
        - task_key: silver_transform
          notebook_task:
            notebook_path: ../02_silver/transform.ipynb
            source: WORKSPACE
          compute_key: serverless
          depends_on:
            - task_key: bronze_ingest
          
        - task_key: gold_reporting
          notebook_task:
            notebook_path: ../03_gold/reporting.ipynb
            source: WORKSPACE
          compute_key: serverless
          depends_on:
            - task_key: silver_transform

targets:
  test:
    mode: development
    default: true
    workspace:
      host: https://dbc-50688538-69d5.cloud.databricks.com
