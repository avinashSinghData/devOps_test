bundle:
  name: loan_portfolio

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Unity Catalog name
    default: workspace
  schema:
    description: Schema name
    default: default

targets:
  dev:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}
  
  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      catalog: workspace
      schema: default