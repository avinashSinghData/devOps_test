name: Deploy Develop to Main

on:
  push:
    branches:
      - develop  # Triggers when you push to develop branch

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop  # Explicitly checkout develop branch

      - name: Validate notebooks exist
        run: |
          test -f 01_bronze/ingest.ipynb
          test -f 02_silver/transform.ipynb
          test -f 03_gold/reporting.ipynb

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop  # Checkout develop branch files
      
      - name: Setup Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      
      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
      
      - name: Switch Databricks Repo to main branch
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          REPO_ID: ${{ secrets.REPO_ID }}
        run: |
          echo "🔄 Switching Databricks repo to main branch..."
          curl -X PATCH "$DATABRICKS_HOST/api/2.0/repos/$REPO_ID" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
          echo "✅ Switched to main branch"
            
      - name: Deploy folders to main branch
        run: |
          export PATH="$HOME/.databricks/bin:$PATH"
          
          echo "📦 Deploying 01_bronze/ folder..."
          databricks workspace import-dir ./01_bronze \
            /Repos/Notebook/notebooks/01_bronze \
            --overwrite
          
          echo "📦 Deploying 02_silver/ folder..."
          databricks workspace import-dir ./02_silver \
            /Repos/Notebook/notebooks/02_silver \
            --overwrite
          
          echo "📦 Deploying 03_gold/ folder..."
          databricks workspace import-dir ./03_gold \
            /Repos/Notebook/notebooks/03_gold \
            --overwrite
          
          echo "✅ All files deployed to main branch successfully!"
