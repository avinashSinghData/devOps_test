name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate notebooks exist
        run: |
          test -f bronze/ingest.ipynb
          test -f silver/transform.ipynb
          test -f gold/Reporting.ipynb

          echo "All notebooks found"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find notebooks
        run: find . -name "*.ipynb"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: echo "Deploying to Databricks (simulation)"
