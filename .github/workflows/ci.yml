name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate notebooks exist
        run: |
          test -f bronze/ingest.ipynb
          test -f silver/transform.ipynb
          test -f gold/reporting.ipynb
          echo "All notebooks found"

      - name: Trigger Databricks Workflow and Wait
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          echo "Triggering Databricks job..."

          RESPONSE=$(curl -s -X POST "$DATABRICKS_HOST/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $DATABRICKS_JOB_ID}")

          RUN_ID=$(echo $RESPONSE | grep -o '"run_id":[0-9]*' | head -1 | cut -d':' -f2)

          echo "Run ID: $RUN_ID"

          echo "Waiting for completion..."

          while true; do
            STATUS=$(curl -s -X GET "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" | grep -o '"life_cycle_state":"[^"]*"' | cut -d':' -f2 | tr -d '"')

            RESULT=$(curl -s -X GET "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" | grep -o '"result_state":"[^"]*"' | cut -d':' -f2 | tr -d '"')

            echo "Status: $STATUS | Result: $RESULT"

            if [ "$STATUS" = "TERMINATED" ]; then
              if [ "$RESULT" = "SUCCESS" ]; then
                echo "Databricks Job SUCCESS"
                exit 0
              else
                echo "Databricks Job FAILED"
                exit 1
              fi
            fi

            sleep 10
          done

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find notebooks
        run: find . -name "*.ipynb"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: |
          echo "Starting deployment..."
          echo "Deploying notebooks..."
          echo "Deployment complete"
