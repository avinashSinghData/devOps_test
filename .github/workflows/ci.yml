name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
         echo "Running CI checks..."

         python -m py_compile $(find . -name "*.py") || true

         echo "CI completed"
