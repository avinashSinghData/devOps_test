name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: |
          echo "Checking lakehouse structure..."
          if [ ! -d "notebooks/bronze" ]; then exit 1; fi
          if [ ! -d "notebooks/silver" ]; then exit 1; fi
          if [ ! -d "notebooks/gold" ]; then exit 1; fi
          echo "Structure OK"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find notebooks
        run: find . -name "*.ipynb"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: echo "Deploying to Databricks (simulation)"
