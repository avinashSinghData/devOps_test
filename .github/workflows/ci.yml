name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "Validating lakehouse structure..."

          if [ ! -d "notebooks/bronze" ]; then exit 1; fi
          if [ ! -d "notebooks/silver" ]; then exit 1; fi
          if [ ! -d "notebooks/gold" ]; then exit 1; fi

          echo "Lakehouse structure OK"
          EOF
