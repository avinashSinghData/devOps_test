name: CI-CD Pipeline

on:
  push:
    branches:
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate notebooks exist
        run: |
          test -f 01_bronze/ingest.ipynb
          test -f 02_silver/transform.ipynb
          test -f 03_gold/reporting.ipynb

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      
      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
      
      - name: Update Databricks Repo
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          REPO_ID: ${{ secrets.REPO_ID }}
        run: |
          curl -X PATCH "$DATABRICKS_HOST/api/2.0/repos/$REPO_ID" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
            
      - name: Deploy to main branch
        run: |
          export PATH="$HOME/.databricks/bin:$PATH"
          databricks workspace import-dir ./bronze /Repos/notebooks/notebook/01_bronze/ingest --overwrite
          databricks workspace import-dir ./silver /Repos/notebooks/notebook/02_silver/transform --overwrite
          databricks workspace import-dir ./gold /Repos/notebooks/notebook/03_gold/reporting --overwrite

