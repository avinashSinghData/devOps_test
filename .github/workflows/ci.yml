name: CI Pipeline

on:
  push:
    branches:
      - first_branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "Checking notebook files..."

          find . -name "*.ipynb"

          echo "Validating notebook structure..."

          python - << 'EOF'
          import json
          import glob

          notebooks = glob.glob("**/*.ipynb", recursive=True)

          if not notebooks:
              print("No notebooks found")
          else:
              for nb in notebooks:
                  try:
                      with open(nb, "r", encoding="utf-8") as f:
                          json.load(f)
                      print(f"{nb} → valid notebook")
                  except Exception as e:
                      print(f"{nb} → INVALID: {e}")
                      exit(1)

          print("All notebooks validated successfully")
          EOF
